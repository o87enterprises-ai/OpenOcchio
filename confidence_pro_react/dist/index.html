    <title>OpenOcchio</title>
    <script>
      // Force unregister service workers to clear cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(registrations => {
          for (const registration of registrations) {
            registration.unregister();
          }
        });
      }
      // Reset stale config if it exists
      const url = localStorage.getItem('occhio_backend_url');
      if (url && url.includes("YOUR-HF-USERNAME")) {
        localStorage.removeItem('occhio_backend_url');
        localStorage.removeItem('occhio_demo_mode');
      }
    </script>
