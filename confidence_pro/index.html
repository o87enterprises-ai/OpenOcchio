<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenOcchio</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/logo.png">
</head>
<body>
    <div class="container">
        <header>
            <img src="assets/logo.png" alt="OpenOcchio Logo" class="logo">
            <h1>OpenOcchio</h1>
            <p class="subtitle">Confidence Indicator</p>
        </header>

        <main>
            <div class="mode-selector">
                <button type="button" class="mode-btn active" data-mode="generate">Ask AI</button>
                <button type="button" class="mode-btn" data-mode="verify">Verify Text</button>
            </div>

            <form id="confidence-form">
                <div class="input-group">
                    <textarea id="prompt-input" placeholder="Enter a prompt to verify..." required rows="4"></textarea>
                </div>
                <button type="submit" id="submit-btn">Check Confidence</button>
            </form>

            <div id="result" class="result-area">
                <!-- Results will be injected here -->
                <div class="placeholder-text">Enter a prompt above to see AI confidence score.</div>
            </div>
        </main>

        <footer>
            <p>Powered by Groq & Llama 3</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
